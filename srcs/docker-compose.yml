networks:
  inception:
    driver: bridge
    name: inception

volumes:
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      device: /home/${USER}/data/wordpress
      o: bind
      type: none
  
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      device: /home/${USER}/data/mariadb
      o: bind
      type: none

services:
  nginx:
    container_name: nginx
    init: true
    build: ./requirements/nginx/.
    ports:
    - "443:443"
    depends_on:
    - wordpress
    volumes:
    - wordpress:/var/www/html
    env_file:
    - ./.env
    networks:
    - inception
    restart: always

  wordpress:
    container_name: wordpress
    init: true
    build: ./requirements/wordpress/.
    depends_on:
    - mariadb
    volumes:
    - wordpress:/var/www/html
    secrets:
    - wp_root_password
    - wp_user_password
    - db_user_password
    env_file:
    - ./.env
    networks:
    - inception
    restart: always

  mariadb:
    container_name: mariadb
    init: true
    build: ./requirements/mariadb/.
    volumes:
    - mariadb:/var/lib/mysql
    secrets:
    - db_user_password
    env_file:
    - ./.env
    networks:
    - inception
    restart: always

secrets:
  db_user_password:
    file: ../secrets/db_user_password
  wp_root_password:
    file: ../secrets/wp_root_password
  wp_user_password:
    file: ../secrets/wp_user_password


